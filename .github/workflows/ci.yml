name: CI

on:
  pull_request:
    paths:
      - "AWS-FCJ-Project/backend/**"
      - "AWS-FCJ-Project/.pre-commit-config.yaml"
      - ".github/workflows/**"
      - "AWS-FCJ-Project/Dockerfile"
      - ".github/terraform/**"
  push:
    branches:
      - main
    paths:
      - "AWS-FCJ-Project/backend/**"
      - "AWS-FCJ-Project/.pre-commit-config.yaml"
      - ".github/workflows/**"
      - "AWS-FCJ-Project/Dockerfile"
      - ".github/terraform/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('AWS-FCJ-Project/.pre-commit-config.yaml') }}

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --config AWS-FCJ-Project/.pre-commit-config.yaml

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "AWS-FCJ-Project/backend/uv.lock"

      - name: Install dependencies
        working-directory: AWS-FCJ-Project/backend
        run: uv sync --dev

      - name: Run unit tests
        working-directory: AWS-FCJ-Project/backend
        run: |
          PYTHONPATH=src uv run pytest tests -v --maxfail=1 --disable-warnings

  security-scan:
    name: Security & Vulnerability Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Bandit (SAST)
        run: |
          pip install bandit
          bandit -r AWS-FCJ-Project/backend/src -x tests -ll --exit-zero

      - name: Run Trivy (Dependency Scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'AWS-FCJ-Project/backend'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  terraform-check:
    name: Terraform Validate & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - name: Terraform Init
        working-directory: .github/terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: .github/terraform
        run: terraform validate

      - name: Run Checkov (Security Scan)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .github/terraform
          framework: terraform
          soft_fail: true # Change to false once baseline is established

  build-and-push:
    name: Build & Push Artifact
    runs-on: ubuntu-latest
    needs: [validate, security-scan, terraform-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.image_vars.outputs.image_tag }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-southeast-1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image variables
        id: image_vars
        run: |
          echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Discover ECR Repository URI
        id: ecr_uri
        run: |
          # Use describe-repositories to find the URI dynamically
          REPO_URI=$(aws ecr describe-repositories --repository-names ${{ secrets.ECR_REPOSITORY_NAME }} --query 'repositories[0].repositoryUri' --output text)
          echo "repository_uri=$REPO_URI" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: AWS-FCJ-Project
          file: AWS-FCJ-Project/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr_uri.outputs.repository_uri }}:${{ github.sha }}
            ${{ steps.ecr_uri.outputs.repository_uri }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max