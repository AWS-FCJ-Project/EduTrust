name: CI

on:
  pull_request:
    paths:
      - "AWS-FCJ-Project/backend/**"
      - "AWS-FCJ-Project/.pre-commit-config.yaml"
      - ".github/workflows/**"
      - "AWS-FCJ-Project/Dockerfile"
      - ".github/terraform/**"
  push:
    branches:
      - main
    paths:
      - "AWS-FCJ-Project/backend/**"
      - "AWS-FCJ-Project/.pre-commit-config.yaml"
      - ".github/workflows/**"
      - "AWS-FCJ-Project/Dockerfile"
      - ".github/terraform/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('AWS-FCJ-Project/.pre-commit-config.yaml') }}

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --config AWS-FCJ-Project/.pre-commit-config.yaml

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "AWS-FCJ-Project/backend/uv.lock"

      - name: Install dependencies
        working-directory: AWS-FCJ-Project/backend
        run: uv sync --dev

      - name: Run unit tests
        working-directory: AWS-FCJ-Project/backend
        env:
          OPENAI_API_KEY: dummy
          TAVILY_API_KEY: dummy
          LITELLM_API_KEY: dummy
          TRANSLATE_MODEL: gpt-3.5-turbo
          AGENT_MODEL: gpt-3.5-turbo
          ORCHESTRATOR_MODEL: gpt-3.5-turbo
          AGENTS_CONFIG_PATH: src/agent/agents_config.yaml
          LLMS_CONFIG_PATH: src/llms_config.yaml
        run: |
          PYTHONPATH=src uv run pytest tests -v --maxfail=1 --disable-warnings

  security-scan:
    name: Security & Vulnerability Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Bandit (SAST)
        run: |
          pip install bandit
          bandit -r AWS-FCJ-Project/backend/src -x tests -ll --exit-zero

      - name: Run Trivy (Dependency Scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'AWS-FCJ-Project/backend'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  terraform-check:
    name: Terraform Validate & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('.github/terraform/**/*.tf') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - name: Terraform Init
        working-directory: .github/terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: .github/terraform
        run: terraform validate

      - name: Run Checkov (Security Scan)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .github/terraform
          framework: terraform
          soft_fail: true # Change to false once baseline is established
