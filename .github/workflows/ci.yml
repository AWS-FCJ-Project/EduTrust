name: CI

on:
  pull_request:
    paths:
      - "AWS-FCJ-Project/backend/**"
      - "AWS-FCJ-Project/.pre-commit-config.yaml"
      - ".github/workflows/**"
      - "AWS-FCJ-Project/Dockerfile"
      - ".github/terraform/**"
  push:
    branches:
      - main
    paths:
      - "AWS-FCJ-Project/backend/**"
      - "AWS-FCJ-Project/.pre-commit-config.yaml"
      - ".github/workflows/**"
      - "AWS-FCJ-Project/Dockerfile"
      - ".github/terraform/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('AWS-FCJ-Project/.pre-commit-config.yaml') }}

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --config AWS-FCJ-Project/.pre-commit-config.yaml

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "AWS-FCJ-Project/backend/uv.lock"

      - name: Install dependencies
        working-directory: AWS-FCJ-Project/backend
        run: uv sync --dev

      - name: Run unit tests
        working-directory: AWS-FCJ-Project/backend
        env:
          OPENAI_API_KEY: dummy
          TAVILY_API_KEY: dummy
          LITELLM_API_KEY: dummy
          TRANSLATE_MODEL: gpt-3.5-turbo
          AGENT_MODEL: gpt-3.5-turbo
          ORCHESTRATOR_MODEL: gpt-3.5-turbo
          AGENTS_CONFIG_PATH: src/agent/agents_config.yaml
          LLMS_CONFIG_PATH: src/llms_config.yaml
        run: |
          PYTHONPATH=src uv run pytest tests -v --maxfail=1 --disable-warnings

  security-scan:
    name: Security & Vulnerability Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Bandit (SAST)
        run: |
          pip install bandit
          bandit -r AWS-FCJ-Project/backend/src -x tests -ll --exit-zero

      - name: Run Trivy (Dependency Scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'AWS-FCJ-Project/backend'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  terraform-check:
    name: Terraform Validate & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - name: Terraform Init
        working-directory: .github/terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: .github/terraform
        run: terraform validate

      - name: Run Checkov (Security Scan)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .github/terraform
          framework: terraform
          soft_fail: true # Change to false once baseline is established

  build-and-push:
    name: Build & Push Artifact
    runs-on: ubuntu-latest
    needs: [validate, security-scan, terraform-check]
    if: (github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    outputs:
      image_tag: ${{ steps.image_vars.outputs.image_tag }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-southeast-1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute Docker Context Hash
        id: compute_hash
        run: |
          set -euo pipefail
          # 1. Isolation: Compute hash considering only key source files
          HASH=$(find AWS-FCJ-Project -type f \( -name "Dockerfile" -o -path "*/backend/src/*" -o -path "*/backend/requirements.txt" -o -path "*/backend/uv.lock" \) | sort | xargs sha256sum | sha256sum | cut -d ' ' -f 1)
          echo "Computed Hash: $HASH"
          echo "image_hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Discover ECR Repository URI
        id: ecr_uri
        run: |
          REPO_URI=$(aws ecr describe-repositories --repository-names ${{ secrets.ECR_REPOSITORY_NAME }} --query 'repositories[0].repositoryUri' --output text)
          echo "repository_uri=$REPO_URI" >> "$GITHUB_OUTPUT"

      - name: Check for Existing Image (Skip if Match)
        id: check_ecr
        run: |
          set +e
          # Check for existing tag equal to the hash
          if aws ecr describe-images --repository-names ${{ secrets.ECR_REPOSITORY_NAME }} --image-ids imageTag=${{ steps.compute_hash.outputs.image_hash }} >/dev/null 2>&1; then
            echo "Match found for hash ${{ steps.compute_hash.outputs.image_hash }}. Skipping build."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "No match for hash ${{ steps.compute_hash.outputs.image_hash }}. Building new image..."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set Image Tags
        id: image_vars
        run: |
          IMAGE_HASH=${{ steps.compute_hash.outputs.image_hash }}
          REPO_URI=${{ steps.ecr_uri.outputs.repository_uri }}
          
          # Base tag is the unique hash
          TAGS="${REPO_URI}:${IMAGE_HASH}"
          
          # Promote to latest only on main
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${REPO_URI}:latest"
          fi
          
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_HASH" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        if: steps.check_ecr.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: AWS-FCJ-Project
          file: AWS-FCJ-Project/Dockerfile
          push: true
          tags: ${{ steps.image_vars.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image Tag Update (Promote without re-build)
        if: steps.check_ecr.outputs.exists == 'true' && github.ref == 'refs/heads/main'
        run: |
          # If image exists by hash but its on main, we just need to ensure 'latest' points to this hash
          # This is almost instant on ECR (just tagging)
          MANIFEST=$(aws ecr batch-get-image --repository-name ${{ secrets.ECR_REPOSITORY_NAME }} --image-ids imageTag=${{ steps.compute_hash.outputs.image_hash }} --query 'images[0].imageManifest' --output text)
          aws ecr put-image --repository-name ${{ secrets.ECR_REPOSITORY_NAME }} --image-tag latest --image-manifest "$MANIFEST"