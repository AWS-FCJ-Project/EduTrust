name: AMI Build Pipeline

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild even if AMI with matching hash exists'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  AWS_REGION: ap-southeast-1

jobs:
  packer-build:
    name: Build Base AMI (Packer)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Packer Init
        working-directory: .github/packer
        run: packer init .

      - name: Compute Packer Configuration Hash
        id: packer_hash
        working-directory: .github/packer
        run: |
          PACKER_HASH=$(sha256sum base-ami.pkr.hcl | awk '{print $1}')
          echo "Computed Packer Hash: $PACKER_HASH"
          echo "hash=$PACKER_HASH" >> "$GITHUB_OUTPUT"

      - name: Check for Existing AMI with Matching Hash
        id: check_ami
        env:
          PACKER_HASH: ${{ steps.packer_hash.outputs.hash }}
          FORCE_BUILD: ${{ github.event.inputs.force_build }}
        run: |
          EXISTING_AMI=$(aws ec2 describe-images \
            --owners self \
            --filters "Name=tag:PackerHash,Values=$PACKER_HASH" \
            --query "Images[0].ImageId" \
            --output text)
          
          if [ "$FORCE_BUILD" != "true" ] && [ "$EXISTING_AMI" != "None" ] && [ -n "$EXISTING_AMI" ]; then
            echo "AMI with matching hash $PACKER_HASH exists ($EXISTING_AMI). Skipping build."
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
            echo "existing_ami=$EXISTING_AMI" >> "$GITHUB_OUTPUT"
          else
            echo "No matching AMI found or force_build enabled. Proceeding with build."
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Temporary VPC for Packer Build
        id: create_vpc
        if: steps.check_ami.outputs.skip_build != 'true'
        run: |
          echo "Creating temporary networking for Packer build..."
          
          VPC_ID=$(aws ec2 create-vpc \
            --cidr-block 10.99.0.0/16 \
            --tag-specifications 'ResourceType=vpc,Tags=[{Key=Name,Value=PackerTempVPC}]' \
            --query Vpc.VpcId \
            --output text)
          echo "VPC_ID=$VPC_ID" >> "$GITHUB_ENV"
          echo "vpc_id=$VPC_ID" >> "$GITHUB_OUTPUT"
          echo "Created VPC: $VPC_ID"
          
          IGW_ID=$(aws ec2 create-internet-gateway \
            --tag-specifications 'ResourceType=internet-gateway,Tags=[{Key=Name,Value=PackerTempIGW}]' \
            --query InternetGateway.InternetGatewayId \
            --output text)
          echo "IGW_ID=$IGW_ID" >> "$GITHUB_ENV"
          echo "igw_id=$IGW_ID" >> "$GITHUB_OUTPUT"
          echo "Created Internet Gateway: $IGW_ID"
          
          aws ec2 attach-internet-gateway --vpc-id "$VPC_ID" --internet-gateway-id "$IGW_ID"
          
          SUBNET_ID=$(aws ec2 create-subnet \
            --vpc-id "$VPC_ID" \
            --cidr-block 10.99.1.0/24 \
            --tag-specifications 'ResourceType=subnet,Tags=[{Key=Name,Value=PackerTempSubnet}]' \
            --query Subnet.SubnetId \
            --output text)
          echo "SUBNET_ID=$SUBNET_ID" >> "$GITHUB_ENV"
          echo "subnet_id=$SUBNET_ID" >> "$GITHUB_OUTPUT"
          echo "Created Subnet: $SUBNET_ID"
          
          aws ec2 modify-subnet-attribute --subnet-id "$SUBNET_ID" --map-public-ip-on-launch
          
          RTB_ID=$(aws ec2 describe-route-tables \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --query "RouteTables[0].RouteTableId" \
            --output text)
          aws ec2 create-route \
            --route-table-id "$RTB_ID" \
            --destination-cidr-block 0.0.0.0/0 \
            --gateway-id "$IGW_ID" >/dev/null
          
          echo "Temporary networking setup complete"

      - name: Deregister Old AMI Versions
        if: steps.check_ami.outputs.skip_build != 'true'
        run: |
          echo "Deregistering old versions of EduTrust-Base-AMI..."
          
          OLD_AMIS_JSON=$(aws ec2 describe-images \
            --owners self \
            --filters "Name=tag:Name,Values=EduTrust-Base-AMI" \
            --query "Images[*].[ImageId,BlockDeviceMappings[*].Ebs.SnapshotId]" \
            --output json || echo "[]")
          
          if [ "$OLD_AMIS_JSON" != "[]" ] && [ -n "$OLD_AMIS_JSON" ]; then
            IMAGE_IDS=$(echo "$OLD_AMIS_JSON" | jq -r '.[][0]')
            for ami_id in $IMAGE_IDS; do
              if [ -n "$ami_id" ] && [ "$ami_id" != "null" ]; then
                echo "Deregistering old AMI: $ami_id"
                aws ec2 deregister-image --image-id "$ami_id" || true
              fi
            done
            
            SNAPSHOT_IDS=$(echo "$OLD_AMIS_JSON" | jq -r '.[][1][]')
            for snap_id in $SNAPSHOT_IDS; do
              if [ -n "$snap_id" ] && [ "$snap_id" != "null" ]; then
                echo "Deleting old snapshot: $snap_id"
                aws ec2 delete-snapshot --snapshot-id "$snap_id" || true
              fi
            done
          else
            echo "No old AMIs found to deregister"
          fi

      - name: Build AMI with Packer
        if: steps.check_ami.outputs.skip_build != 'true'
        working-directory: .github/packer
        env:
          VPC_ID: ${{ steps.create_vpc.outputs.vpc_id }}
          SUBNET_ID: ${{ steps.create_vpc.outputs.subnet_id }}
          PACKER_HASH: ${{ steps.packer_hash.outputs.hash }}
        run: |
          echo "Building new AMI with hash: $PACKER_HASH"
          packer build \
            -var "vpc_id=$VPC_ID" \
            -var "subnet_id=$SUBNET_ID" \
            -var "packer_hash=$PACKER_HASH" \
            base-ami.pkr.hcl

      - name: Cleanup Temporary VPC Resources
        if: always() && steps.create_vpc.outputs.vpc_id != ''
        env:
          VPC_ID: ${{ steps.create_vpc.outputs.vpc_id }}
          IGW_ID: ${{ steps.create_vpc.outputs.igw_id }}
          SUBNET_ID: ${{ steps.create_vpc.outputs.subnet_id }}
        run: |
          echo "Cleaning up temporary VPC resources..."
          sleep 10
          
          aws ec2 delete-subnet --subnet-id "$SUBNET_ID" || true
          aws ec2 detach-internet-gateway --internet-gateway-id "$IGW_ID" --vpc-id "$VPC_ID" || true
          aws ec2 delete-internet-gateway --internet-gateway-id "$IGW_ID" || true
          aws ec2 delete-vpc --vpc-id "$VPC_ID" || true
          
          echo "Cleanup complete"
