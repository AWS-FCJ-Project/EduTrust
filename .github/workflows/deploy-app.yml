name: Deploy Application (FE & BE)

on:
  workflow_run:
    workflows: ["Terraform Deploy"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # --- BACKEND JOB ---
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-southeast-1
      TF_DIR_APP: .github/terraform/service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform (for outputs)
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Output
        working-directory: ${{ env.TF_DIR_APP }}
        id: tf_output
        run: |
          terraform init
          echo "asg_name=$(terraform output -raw backend_asg_name)" >> "$GITHUB_OUTPUT"
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "kms_arn=$(terraform output -raw secrets_kms_key_arn)" >> "$GITHUB_OUTPUT"

      - name: Compute Docker Context Hash
        id: compute_hash
        run: |
          HASH=$(find AWS-FCJ-Project -type f \( -name "Dockerfile" -o -path "*/backend/src/*" -o -path "*/backend/requirements.txt" -o -path "*/backend/uv.lock" \) | sort | xargs sha256sum | sha256sum | cut -d ' ' -f 1)
          echo "image_hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: login_ecr

      - name: Check for Existing Image (Skip if Match)
        id: check_ecr
        run: |
          REPO_NAME=$(echo "${{ steps.tf_output.outputs.ecr_url }}" | cut -d'/' -f2)
          if aws ecr describe-images --repository-names "$REPO_NAME" --image-ids imageTag=${{ steps.compute_hash.outputs.image_hash }} >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        if: steps.check_ecr.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: AWS-FCJ-Project
          file: AWS-FCJ-Project/Dockerfile
          push: true
          tags: ${{ steps.tf_output.outputs.ecr_url }}:${{ steps.compute_hash.outputs.image_hash }},${{ steps.tf_output.outputs.ecr_url }}:latest

      - name: Update SSM and Refresh ASG
        run: |
          aws ssm put-parameter --name "/edutrust/backend/env" --value "${{ secrets.BACKEND_ENV_FILE }}" --type "SecureString" --key-id "${{ steps.tf_output.outputs.kms_arn }}" --overwrite
          aws autoscaling start-instance-refresh --auto-scaling-group-name "${{ steps.tf_output.outputs.asg_name }}" --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 60}'

  # --- FRONTEND JOB ---
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    env:
      AWS_REGION: ap-southeast-1
      S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
      CLOUDFRONT_DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "AWS-FCJ-Project/frontend/package-lock.json"

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and Sync
        working-directory: AWS-FCJ-Project/frontend
        run: |
          npm install
          npm run build
          aws s3 sync out s3://${{ env.S3_BUCKET }} --delete
          aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DIST_ID }} --paths "/*"
