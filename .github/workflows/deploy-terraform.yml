name: Terraform Deploy

on:
  workflow_run:
    workflows: ["Build AMI (Packer)"]
    types: [completed]
    branches: ["main", "feat/**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_DIR: .github/terraform

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    env:
      TERRAFORM_VARS: ${{ secrets.TERRAFORM_VARIABLES }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_DIR_BASE: .github/terraform/core
      TF_DIR_APP: .github/terraform/service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('.github/terraform/**/*.tf') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Write terraform.tfvars
        run: |
          printf "%s\n" "$TERRAFORM_VARS" > ${{ env.TF_DIR_BASE }}/terraform.tfvars
          printf "%s\n" "$TERRAFORM_VARS" > ${{ env.TF_DIR_APP }}/terraform.tfvars

      - name: Terraform Init & Apply (Base)
        working-directory: ${{ env.TF_DIR_BASE }}
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Terraform Init & Apply (App)
        working-directory: ${{ env.TF_DIR_APP }}
        run: |
          terraform init
          terraform apply -auto-approve
