name: Deploy (EC2)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      build_ami:
        description: 'Build Base AMI with Packer before deploying?'
        required: false
        type: boolean
        default: false
permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: false

env:
  TF_DIR: .github/terraform
  CONTAINER_NAME: aws-fcj-backend

jobs:
  packer:
    name: Build Base AMI (Packer)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Run Packer Init
        working-directory: .github/packer
        run: packer init .

      - name: Run Packer Build
        working-directory: .github/packer
        run: |
          # 1. Compute Hash and Check for existing AMI
          PACKER_HASH=$(sha256sum base-ami.pkr.hcl | awk '{print $1}')
          echo "Computed Packer Hash: $PACKER_HASH"
          
          EXISTING_AMI=$(aws ec2 describe-images --owners self --filters "Name=tag:PackerHash,Values=$PACKER_HASH" --query "Images[0].ImageId" --output text)
          
          FORCE_BUILD="${{ github.event.inputs.build_ami }}"
          if [ "$FORCE_BUILD" != "true" ] && [ "$EXISTING_AMI" != "None" ] && [ -n "$EXISTING_AMI" ]; then
            echo "AMI with exact config match $PACKER_HASH exists ($EXISTING_AMI). Skipping delete and build."
            exit 0
          fi

          # 2. Create Temporary Networking for Packer
          echo "Creating temporary Networking for Packer build..."
          VPC_ID=$(aws ec2 create-vpc --cidr-block 10.99.0.0/16 --tag-specifications 'ResourceType=vpc,Tags=[{Key=Name,Value=PackerTempVPC}]' --query Vpc.VpcId --output text)
          echo "VPC_ID=$VPC_ID" >> "$GITHUB_ENV"
          
          IGW_ID=$(aws ec2 create-internet-gateway --tag-specifications 'ResourceType=internet-gateway,Tags=[{Key=Name,Value=PackerTempIGW}]' --query InternetGateway.InternetGatewayId --output text)
          echo "IGW_ID=$IGW_ID" >> "$GITHUB_ENV"
          aws ec2 attach-internet-gateway --vpc-id "$VPC_ID" --internet-gateway-id "$IGW_ID"
          
          SUBNET_ID=$(aws ec2 create-subnet --vpc-id "$VPC_ID" --cidr-block 10.99.1.0/24 --tag-specifications 'ResourceType=subnet,Tags=[{Key=Name,Value=PackerTempSubnet}]' --query Subnet.SubnetId --output text)
          echo "SUBNET_ID=$SUBNET_ID" >> "$GITHUB_ENV"
          aws ec2 modify-subnet-attribute --subnet-id "$SUBNET_ID" --map-public-ip-on-launch
          
          RTB_ID=$(aws ec2 describe-route-tables --filters "Name=vpc-id,Values=$VPC_ID" --query "RouteTables[0].RouteTableId" --output text)
          aws ec2 create-route --route-table-id "$RTB_ID" --destination-cidr-block 0.0.0.0/0 --gateway-id "$IGW_ID" >/dev/null
          
          echo "Found VPC_ID: $VPC_ID"
          echo "Found SUBNET_ID: $SUBNET_ID"
          
          # 3. Skip name collision check (Packer uses timestamp)
          echo "Skipping name collision check as Packer name includes timestamp."
          
          # 4. Build new AMI
          echo "Building new AMI with hash: $PACKER_HASH"
          packer build -var "vpc_id=$VPC_ID" -var "subnet_id=$SUBNET_ID" -var "packer_hash=$PACKER_HASH" base-ami.pkr.hcl

      - name: Cleanup Packer Build Network
        if: always() && env.VPC_ID != ''
        run: |
          echo "Cleaning up temporary VPC resources..."
          # Cleanup in reverse order of creation
          # Wait a few seconds for Packer-provisioned SG to be fully cleared by AWS
          sleep 10
          aws ec2 delete-subnet --subnet-id "$SUBNET_ID" || true
          aws ec2 detach-internet-gateway --internet-gateway-id "$IGW_ID" --vpc-id "$VPC_ID" || true
          aws ec2 delete-internet-gateway --internet-gateway-id "$IGW_ID" || true
          aws ec2 delete-vpc --vpc-id "$VPC_ID" || true


  terraform:
    name: Provision/Update EC2 (Terraform apply)
    runs-on: ubuntu-latest
    needs: packer
    if: always() && (needs.packer.result == 'success' || needs.packer.result == 'skipped') && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    outputs:
      asg_name: ${{ steps.tf_output.outputs.asg_name }}
      aws_region: ${{ steps.tf_output.outputs.aws_region }}
      ecr_repository_url: ${{ steps.tf_output.outputs.ecr_repository_url }}
      backend_port: ${{ steps.tf_output.outputs.backend_port }}
      secrets_kms_key_arn: ${{ steps.tf_output.outputs.secrets_kms_key_arn }}
      ecr_tag_immutable: ${{ steps.ecr_vars.outputs.ecr_tag_immutable }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-1
      TERRAFORM_VARS: ${{ secrets.TERRAFORM_VARIABLES }}
      TF_DIR_BASE: .github/terraform/core
      TF_DIR_APP: .github/terraform/service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('.github/terraform/**/*.tf') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Write terraform.tfvars for Base and App
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
        run: |
          printf "%s\n" "$TERRAFORM_VARS" > ${{ env.TF_DIR_BASE }}/terraform.tfvars
          printf "%s\n" "$TERRAFORM_VARS" > ${{ env.TF_DIR_APP }}/terraform.tfvars

      - name: Read ECR tag immutability
        id: ecr_vars
        working-directory: ${{ env.TF_DIR_BASE }}
        run: |
          set -euo pipefail
          IMMUTABLE=""
          if [ -f terraform.tfvars ]; then
            IMMUTABLE="$(awk -F= '$1 ~ /^[[:space:]]*ecr_tag_immutable[[:space:]]*$/ { v=$2; gsub(/^[[:space:]]+|[[:space:]]+$/, "", v); gsub(/\"/, "", v); print v; exit }' terraform.tfvars || true)"
          fi
          IMMUTABLE="${IMMUTABLE:-true}"
          echo "ecr_tag_immutable=$IMMUTABLE" >> "$GITHUB_OUTPUT"

      - name: Terraform Init (Base)
        working-directory: ${{ env.TF_DIR_BASE }}
        run: terraform init

      - name: Import existing ECR (Base)
        working-directory: ${{ env.TF_DIR_BASE }}
        run: |
          set -euo pipefail
          REPO_NAME="$(awk -F= '$1 ~ /^[[:space:]]*ecr_repository_name[[:space:]]*$/ { v=$2; gsub(/^[[:space:]]+|[[:space:]]+$/, "", v); gsub(/\"/, "", v); print v; exit }' terraform.tfvars || true)"
          REPO_NAME="${REPO_NAME:-${{ secrets.ECR_REPOSITORY_NAME }}}"
          if aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1; then
            if terraform state show aws_ecr_repository.backend >/dev/null 2>&1; then
              echo "ECR repo already in Terraform state."
            else
              terraform import aws_ecr_repository.backend "$REPO_NAME"
            fi
          fi

      - name: Terraform Apply (Base)
        working-directory: ${{ env.TF_DIR_BASE }}
        run: terraform apply -auto-approve -input=false

      - name: Terraform Init (App)
        working-directory: ${{ env.TF_DIR_APP }}
        run: terraform init

      - name: Terraform Apply (App)
        working-directory: ${{ env.TF_DIR_APP }}
        run: terraform apply -auto-approve -input=false

      - name: Get Terraform Outputs (App)
        id: tf_output
        working-directory: ${{ env.TF_DIR_APP }}
        run: |
          echo "asg_name=$(terraform output -raw backend_asg_name)" >> "$GITHUB_OUTPUT"
          echo "aws_region=$(terraform output -raw aws_region)" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "backend_port=$(terraform output -raw backend_port)" >> "$GITHUB_OUTPUT"
          echo "secrets_kms_key_arn=$(terraform output -raw secrets_kms_key_arn)" >> "$GITHUB_OUTPUT"


  deploy:
    name: Deploy to ASG (Rolling Update)
    runs-on: ubuntu-latest
    needs: terraform
    if: always() && needs.terraform.result == 'success' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ needs.terraform.outputs.aws_region }}
      ASG_NAME: ${{ needs.terraform.outputs.asg_name }}
      IMAGE_TAG: ${{ github.sha }}
      BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
      SECRETS_KMS_KEY_ARN: ${{ needs.terraform.outputs.secrets_kms_key_arn }}
      TF_DIR: .github/terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Environment Variables in SSM
        run: |
          aws ssm put-parameter \
            --name "/edutrust/backend/env" \
            --value "$BACKEND_ENV_FILE" \
            --type "SecureString" \
            --key-id "$SECRETS_KMS_KEY_ARN" \
            --overwrite


      - name: Start ASG Instance Refresh
        run: |
          echo "Checking for in-progress instance refresh for ASG: $ASG_NAME"
          CURRENT_REFRESH_ID=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name "$ASG_NAME" \
            --query "InstanceRefreshes[?Status=='InProgress'].InstanceRefreshId" \
            --output text)

          if [ -n "$CURRENT_REFRESH_ID" ] && [ "$CURRENT_REFRESH_ID" != "None" ]; then
            echo "A refresh ($CURRENT_REFRESH_ID) is already in progress. Cancelling it..."
            aws autoscaling cancel-instance-refresh --auto-scaling-group-name "$ASG_NAME"
            echo "Waiting for cancellation to process..."
            sleep 30
          fi

          echo "Starting new instance refresh for ASG: $ASG_NAME"
          # TIMEOUT removed as requested
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 60}' \
            --query "InstanceRefreshId" \
            --output text)
          echo "Instance Refresh ID: $REFRESH_ID"
          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$REFRESH_ID" \
              --query "InstanceRefreshes[0].Status" \
              --output text)
            PERCENTAGE=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$REFRESH_ID" \
              --query "InstanceRefreshes[0].PercentageComplete" \
              --output text)
            echo "Status: $STATUS ($PERCENTAGE% complete)..."
            case "$STATUS" in
              Successful) echo "Deployment successful!"; break ;;
              Failed|Cancelled|TimedOut)
                echo "Deployment $STATUS!"
                REASON=$(aws autoscaling describe-instance-refreshes \
                  --auto-scaling-group-name "$ASG_NAME" \
                  --instance-refresh-ids "$REFRESH_ID" \
                  --query "InstanceRefreshes[0].StatusReason" \
                  --output text)
                echo "Reason: $REASON"
                exit 1 ;;
              *) sleep 30 ;;
            esac
          done

  cleanup:
    name: Cleanup Old AMIs (Keep Last 3)
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && needs.deploy.result == 'success'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-1
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Safe AMI Cleanup
        run: |
          set -euo pipefail
          
          echo "Fetching all EduTrust-Base-AMI images..."
          # Get list of AMIs sorted by CreationDate (newest first)
          # Query returns [ImageId, CreationDate]
          AMIS_JSON=$(aws ec2 describe-images --owners self --filters "Name=tag:Name,Values=EduTrust-Base-AMI" --query "sort_by(Images, &CreationDate)[::-1].[ImageId]" --output json)
          
          AMI_COUNT=$(echo "$AMIS_JSON" | jq '. | length')
          echo "Found $AMI_COUNT total AMIs."
          
          if [ "$AMI_COUNT" -le 3 ]; then
            echo "Current AMI count ($AMI_COUNT) is 3 or less. No cleanup needed."
            exit 0
          fi
          
          # Get AMI IDs to delete (everything from index 3 onwards)
          TARGET_AMIS=$(echo "$AMIS_JSON" | jq -r '.[3:][] | .[0]')
          
          for ami_id in $TARGET_AMIS; do
            echo "--------------------------------------------------------"
            echo "Checking if old AMI is safe to delete: $ami_id"
            
            # 1. Check if any instance (any state) is using this AMI
            ACTIVE_INSTANCES=$(aws ec2 describe-instances --filters "Name=image-id,Values=$ami_id" --query "Reservations[*].Instances[*].InstanceId" --output text)
            
            if [ -n "$ACTIVE_INSTANCES" ] && [ "$ACTIVE_INSTANCES" != "None" ]; then
              echo "WARNING: AMI $ami_id is still being used by instances: $ACTIVE_INSTANCES. Skipping deregistration."
              continue
            fi
            
            # 2. Get Snapshots associated with this AMI
            SNAPSHOT_IDS=$(aws ec2 describe-images --image-ids "$ami_id" --query "Images[0].BlockDeviceMappings[*].Ebs.SnapshotId" --output text)
            
            # 3. Deregister AMI
            echo "Deregistering safe-to-delete AMI: $ami_id"
            aws ec2 deregister-image --image-id "$ami_id"
            
            # 4. Delete Snapshots
            for snap_id in $SNAPSHOT_IDS; do
              if [ -n "$snap_id" ] && [ "$snap_id" != "None" ]; then
                echo "Deleting snapshot: $snap_id"
                aws ec2 delete-snapshot --snapshot-id "$snap_id" || echo "Failed to delete snapshot $snap_id (might still be in use)"
              fi
            done
            echo "Successfully cleaned up AMI $ami_id"
          done