name: Deploy (EC2)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main", "feat/**"]
  workflow_dispatch:
    inputs:
      build_ami:
        description: 'Build Base AMI with Packer before deploying?'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: false

env:
  CONTAINER_NAME: aws-fcj-backend
  AWS_REGION: ap-southeast-1

jobs:
  packer:
    name: Build Base AMI (Packer)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Packer Init
        working-directory: .github/packer
        run: packer init .

      - name: Run Packer Build
        working-directory: .github/packer
        run: |
          # 1. Compute Hash and Check for existing AMI
          PACKER_HASH=$(sha256sum base-ami.pkr.hcl | awk '{print $1}')
          echo "Computed Packer Hash: $PACKER_HASH"
          
          EXISTING_AMI=$(aws ec2 describe-images --owners self --filters "Name=tag:PackerHash,Values=$PACKER_HASH" --query "Images[0].ImageId" --output text)
          
          FORCE_BUILD="${{ github.event.inputs.build_ami }}"
          if [ "$FORCE_BUILD" != "true" ] && [ "$EXISTING_AMI" != "None" ] && [ -n "$EXISTING_AMI" ]; then
            echo "AMI with exact config match $PACKER_HASH exists ($EXISTING_AMI). Skipping delete and build."
            exit 0
          fi

          # 2. Create Temporary Networking for Packer
          echo "Creating temporary Networking for Packer build..."
          VPC_ID=$(aws ec2 create-vpc --cidr-block 10.99.0.0/16 --tag-specifications 'ResourceType=vpc,Tags=[{Key=Name,Value=PackerTempVPC}]' --query Vpc.VpcId --output text)
          echo "VPC_ID=$VPC_ID" >> "$GITHUB_ENV"
          
          IGW_ID=$(aws ec2 create-internet-gateway --tag-specifications 'ResourceType=internet-gateway,Tags=[{Key=Name,Value=PackerTempIGW}]' --query InternetGateway.InternetGatewayId --output text)
          echo "IGW_ID=$IGW_ID" >> "$GITHUB_ENV"
          aws ec2 attach-internet-gateway --vpc-id "$VPC_ID" --internet-gateway-id "$IGW_ID"
          
          SUBNET_ID=$(aws ec2 create-subnet --vpc-id "$VPC_ID" --cidr-block 10.99.1.0/24 --tag-specifications 'ResourceType=subnet,Tags=[{Key=Name,Value=PackerTempSubnet}]' --query Subnet.SubnetId --output text)
          echo "SUBNET_ID=$SUBNET_ID" >> "$GITHUB_ENV"
          aws ec2 modify-subnet-attribute --subnet-id "$SUBNET_ID" --map-public-ip-on-launch
          
          RTB_ID=$(aws ec2 describe-route-tables --filters "Name=vpc-id,Values=$VPC_ID" --query "RouteTables[0].RouteTableId" --output text)
          aws ec2 create-route --route-table-id "$RTB_ID" --destination-cidr-block 0.0.0.0/0 --gateway-id "$IGW_ID" >/dev/null
          
          echo "Found VPC_ID: $VPC_ID"
          echo "Found SUBNET_ID: $SUBNET_ID"
          
          # 3. Deregister old versions of EduTrust-Base-AMI (to avoid name collision)
          echo "Deregistering old versions of EduTrust-Base-AMI..."
          OLD_AMIS_JSON=$(aws ec2 describe-images --owners self --filters "Name=tag:Name,Values=EduTrust-Base-AMI" --query "Images[*].[ImageId,BlockDeviceMappings[*].Ebs.SnapshotId]" --output json || echo "[]")
          
          if [ "$OLD_AMIS_JSON" != "[]" ] && [ -n "$OLD_AMIS_JSON" ]; then
            IMAGE_IDS=$(echo "$OLD_AMIS_JSON" | jq -r '.[][0]')
            for ami_id in $IMAGE_IDS; do
              if [ -n "$ami_id" ] && [ "$ami_id" != "null" ]; then
                echo "Deregistering old AMI: $ami_id"
                aws ec2 deregister-image --image-id "$ami_id" || true
              fi
            done
            
            SNAPSHOT_IDS=$(echo "$OLD_AMIS_JSON" | jq -r '.[][1][]')
            for snap_id in $SNAPSHOT_IDS; do
              if [ -n "$snap_id" ] && [ "$snap_id" != "null" ]; then
                echo "Deleting old snapshot: $snap_id"
                aws ec2 delete-snapshot --snapshot-id "$snap_id" || true
              fi
            done
          fi
          
          # 4. Build new AMI
          echo "Building new AMI with hash: $PACKER_HASH"
          packer build -var "vpc_id=$VPC_ID" -var "subnet_id=$SUBNET_ID" -var "packer_hash=$PACKER_HASH" base-ami.pkr.hcl

      - name: Cleanup Packer Build Network
        if: always() && env.VPC_ID != ''
        run: |
          echo "Cleaning up temporary VPC resources..."
          sleep 10
          aws ec2 delete-subnet --subnet-id "$SUBNET_ID" || true
          aws ec2 detach-internet-gateway --internet-gateway-id "$IGW_ID" --vpc-id "$VPC_ID" || true
          aws ec2 delete-internet-gateway --internet-gateway-id "$IGW_ID" || true
          aws ec2 delete-vpc --vpc-id "$VPC_ID" || true

  terraform:
    name: Provision Infrastructure (Terraform)
    runs-on: ubuntu-latest
    needs: packer
    if: always() && (needs.packer.result == 'success' || needs.packer.result == 'skipped')
    outputs:
      asg_name: ${{ steps.tf_output.outputs.asg_name }}
      aws_region: ${{ steps.tf_output.outputs.aws_region }}
      ecr_repository_url: ${{ steps.tf_output.outputs.ecr_repository_url }}
      backend_port: ${{ steps.tf_output.outputs.backend_port }}
      secrets_kms_key_arn: ${{ steps.tf_output.outputs.secrets_kms_key_arn }}
      ecr_tag_immutable: ${{ steps.ecr_vars.outputs.ecr_tag_immutable }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-1
      TERRAFORM_VARS: ${{ secrets.TERRAFORM_VARIABLES }}
      TF_DIR_BASE: .github/terraform/core
      TF_DIR_APP: .github/terraform/service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Check for Core Infra changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            core:
              - '.github/terraform/core/**'
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Write terraform.tfvars
        run: |
          cat <<'TFVARS' > ${{ env.TF_DIR_BASE }}/terraform.tfvars
          ${{ secrets.TERRAFORM_VARIABLES }}
          TFVARS
          cat <<'TFVARS' > ${{ env.TF_DIR_APP }}/terraform.tfvars
          ${{ secrets.TERRAFORM_VARIABLES }}
          TFVARS

      - name: Debug terraform.tfvars content
        run: |
          echo "=== Core terraform.tfvars (first 20 lines) ==="
          head -20 ${{ env.TF_DIR_BASE }}/terraform.tfvars
          echo "=== Service terraform.tfvars (first 20 lines) ==="
          head -20 ${{ env.TF_DIR_APP }}/terraform.tfvars

      - name: Read ECR tag immutability (ecr_tag_immutable)
        id: ecr_vars
        working-directory: ${{ env.TF_DIR_BASE }}
        run: |
          set -euo pipefail
          IMMUTABLE=""
          if [ -f terraform.tfvars ]; then
            IMMUTABLE="$(awk -F= '
              $1 ~ /^[[:space:]]*ecr_tag_immutable[[:space:]]*$/ {
                v=$2
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", v)
                gsub(/\"/, "", v)
                print v
                exit
              }' terraform.tfvars || true)"
          fi
          IMMUTABLE="${IMMUTABLE:-true}"
          echo "ecr_tag_immutable=$IMMUTABLE" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Ensure ECR Repository exists (Create or Import)
        working-directory: ${{ env.TF_DIR_BASE }}
        run: |
          set -euo pipefail
          terraform init
          if [ -f terraform.tfvars ]; then
            REPO_NAME="$(awk -F= '
              $1 ~ /^[[:space:]]*ECR_REPOSITORY_NAME[[:space:]]*$/ {
                v=$2
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", v)
                gsub(/\"/, "", v)
                print v
                exit
              }' terraform.tfvars || true)"
          fi
          REPO_NAME="${REPO_NAME:-edutrust-backend}"
          echo "Found REPO_NAME: $REPO_NAME"

          if aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1; then
            if terraform state show aws_ecr_repository.backend >/dev/null 2>&1; then
              echo "ECR repo $REPO_NAME already in Terraform state, skipping import."
            else
              echo "ECR repo $REPO_NAME exists in AWS but not in state; importing..."
              terraform import aws_ecr_repository.backend "$REPO_NAME" || true
            fi
          else
            echo "ECR repo $REPO_NAME does not exist. Creating with MUTABLE tags..."
            aws ecr create-repository --repository-name "$REPO_NAME" \
              --image-tag-mutability MUTABLE \
              --encryption-configuration encryptionType=AES256 || true
          fi

      - name: Terraform Apply (Core)
        if: steps.filter.outputs.core == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: ${{ env.TF_DIR_BASE }}
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
        run: |
          terraform init
          terraform apply -auto-approve -input=false

      - name: Terraform Apply (Service)
        working-directory: ${{ env.TF_DIR_APP }}
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
        run: |
          terraform init
          terraform apply -auto-approve -input=false

      - name: Get Terraform Outputs
        id: tf_output
        working-directory: ${{ env.TF_DIR_APP }}
        run: |
          echo "asg_name=$(terraform output -raw backend_asg_name)" >> "$GITHUB_OUTPUT"
          echo "aws_region=$(terraform output -raw aws_region)" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "backend_port=$(terraform output -raw backend_port)" >> "$GITHUB_OUTPUT"
          echo "secrets_kms_key_arn=$(terraform output -raw secrets_kms_key_arn)" >> "$GITHUB_OUTPUT"

  build-backend:
    name: Build & Push Backend App
    runs-on: ubuntu-latest
    needs: terraform
    if: always() && needs.terraform.result == 'success'
    outputs:
      image: ${{ steps.image_vars.outputs.image }}
      image_tag: ${{ steps.image_vars.outputs.image_tag }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ needs.terraform.outputs.aws_region || 'ap-southeast-1' }}
      ECR_REPOSITORY_URL: ${{ needs.terraform.outputs.ecr_repository_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Compute Docker Context Hash
        id: compute_hash
        run: |
          HASH=$(find backend -type f \( -name "Dockerfile" -o -path "*/backend/src/*" -o -path "*/backend/requirements.txt" -o -path "*/backend/uv.lock" \) | sort | xargs sha256sum | sha256sum | cut -d ' ' -f 1)
          echo "image_hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Set image variables
        id: image_vars
        run: |
          echo "image=${ECR_REPOSITORY_URL}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${{ steps.compute_hash.outputs.image_hash }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: Check for Existing Image (Skip if Match)
        id: check_ecr
        run: |
          REPO_NAME=$(echo "${ECR_REPOSITORY_URL}" | cut -d'/' -f2)
          echo "Checking for image tag ${{ steps.compute_hash.outputs.image_hash }} in repository $REPO_NAME..."
          if aws ecr describe-images --repository-names "$REPO_NAME" --image-ids imageTag=${{ steps.compute_hash.outputs.image_hash }} --query "imageDetails[0].imageDigest" --output text >/dev/null 2>&1; then
            echo "Image exists. Skipping push."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Image does not exist. Proceeding with build."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute Docker tags
        id: docker_tags
        env:
          IMAGE: ${{ steps.image_vars.outputs.image }}
          IMAGE_TAG: ${{ steps.image_vars.outputs.image_tag }}
          ECR_TAG_IMMUTABLE: ${{ needs.terraform.outputs.ecr_tag_immutable }}
        run: |
          set -euo pipefail
          SHA_TAG="${IMAGE}:${IMAGE_TAG}"
          if [ "$ECR_TAG_IMMUTABLE" = "true" ]; then
            TAGS="$SHA_TAG"
          else
            TAGS="$SHA_TAG\n${IMAGE}:latest"
          fi
          {
            echo "tags<<EOF"
            printf "%b\n" "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: steps.check_ecr.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}

  deploy-frontend:
    name: Build & Deploy Frontend (S3)
    runs-on: ubuntu-latest
    needs: terraform
    if: always() && needs.terraform.result == 'success'
    env:
      AWS_REGION: ap-southeast-1
      S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
      CLOUDFRONT_DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and Sync
        working-directory: frontend
        run: |
          npm install
          npm run build
          aws s3 sync out/ s3://${{ env.S3_BUCKET }} --delete
          aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DIST_ID }} --paths "/*"

  deploy-backend:
    name: Deploy Backend to ASG (EC2)
    runs-on: ubuntu-latest
    needs: [terraform, build-backend]
    if: always() && needs.terraform.result == 'success' && needs.build-backend.result == 'success'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ needs.terraform.outputs.aws_region || 'ap-southeast-1' }}
      ASG_NAME: ${{ needs.terraform.outputs.asg_name }}
      IMAGE_TAG: ${{ needs.build-backend.outputs.image_tag }}
      BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
      SECRETS_KMS_KEY_ARN: ${{ needs.terraform.outputs.secrets_kms_key_arn }}
      TF_DIR_APP: .github/terraform/service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Environment Variables in SSM
        run: |
          aws ssm put-parameter \
            --name "/edutrust/backend/env" \
            --value "$BACKEND_ENV_FILE" \
            --type "SecureString" \
            --key-id "$SECRETS_KMS_KEY_ARN" \
            --overwrite

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Write terraform.tfvars
        run: |
          cat <<'TFVARS' > ${{ env.TF_DIR_APP }}/terraform.tfvars
          ${{ secrets.TERRAFORM_VARIABLES }}
          TFVARS

      - name: Update Launch Template with new tag
        working-directory: ${{ env.TF_DIR_APP }}
        run: |
          terraform init
          terraform apply -auto-approve -input=false -var="backend_image_tag=$IMAGE_TAG"

      - name: Start ASG Instance Refresh
        run: |
          echo "Checking for in-progress instance refresh for ASG: $ASG_NAME"
          CURRENT_REFRESH_ID=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name "$ASG_NAME" \
            --query "InstanceRefreshes[?Status=='InProgress'].InstanceRefreshId" \
            --output text)

          if [ -n "$CURRENT_REFRESH_ID" ] && [ "$CURRENT_REFRESH_ID" != "None" ]; then
            echo "A refresh ($CURRENT_REFRESH_ID) is already in progress. Cancelling it..."
            aws autoscaling cancel-instance-refresh --auto-scaling-group-name "$ASG_NAME"
            echo "Waiting for cancellation to process..."
            sleep 30
          fi

          echo "Starting new instance refresh for ASG: $ASG_NAME"
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 60}' \
            --query "InstanceRefreshId" \
            --output text)
          echo "Instance Refresh ID: $REFRESH_ID"
          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$REFRESH_ID" \
              --query "InstanceRefreshes[0].Status" \
              --output text)
            PERCENTAGE=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$REFRESH_ID" \
              --query "InstanceRefreshes[0].PercentageComplete" \
              --output text)
            echo "Status: $STATUS ($PERCENTAGE% complete)..."
            case "$STATUS" in
              Successful) echo "Deployment successful!"; break ;;
              Failed|Cancelled|TimedOut)
                echo "Deployment $STATUS!"
                REASON=$(aws autoscaling describe-instance-refreshes \
                  --auto-scaling-group-name "$ASG_NAME" \
                  --instance-refresh-ids "$REFRESH_ID" \
                  --query "InstanceRefreshes[0].StatusReason" \
                  --output text)
                echo "Reason: $REASON"
                exit 1 ;;
              *) sleep 30 ;;
            esac
          done
