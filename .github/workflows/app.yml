name: Application Pipeline

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - main
      - 'feat/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: app-pipeline-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-1

jobs:
  build-backend:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      image: ${{ steps.image_vars.outputs.image }}
      image_tag: ${{ steps.image_vars.outputs.image_tag }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-1
      TF_DIR_SERVICE: .github/terraform/service
      # Terraform variables from secrets
      TF_VAR_aws_region: ${{ secrets.TF_VAR_aws_region }}
      TF_VAR_ec2_instance_type: ${{ secrets.TF_VAR_ec2_instance_type }}
      TF_VAR_ec2_instance_name: ${{ secrets.TF_VAR_ec2_instance_name }}
      TF_VAR_ec2_key_name: ${{ secrets.TF_VAR_ec2_key_name }}
      TF_VAR_ECR_REPOSITORY_NAME: ${{ secrets.TF_VAR_ECR_REPOSITORY_NAME }}
      TF_VAR_ecr_tag_immutable: ${{ secrets.TF_VAR_ecr_tag_immutable }}
      TF_VAR_asg_min_size: ${{ secrets.TF_VAR_asg_min_size }}
      TF_VAR_asg_max_size: ${{ secrets.TF_VAR_asg_max_size }}
      TF_VAR_asg_desired_capacity: ${{ secrets.TF_VAR_asg_desired_capacity }}
      TF_VAR_backend_image_tag: ${{ secrets.TF_VAR_backend_image_tag }}
      TF_VAR_docdb_egress_cidr_blocks: ${{ secrets.TF_VAR_docdb_egress_cidr_blocks }}
      TF_VAR_redis_egress_cidr_blocks: ${{ secrets.TF_VAR_redis_egress_cidr_blocks }}
      TF_VAR_dns_egress_cidr_blocks: ${{ secrets.TF_VAR_dns_egress_cidr_blocks }}
      TF_VAR_vpc_cidr_block: ${{ secrets.TF_VAR_vpc_cidr_block }}
      TF_VAR_private_subnet_1a_cidr: ${{ secrets.TF_VAR_private_subnet_1a_cidr }}
      TF_VAR_private_subnet_1c_cidr: ${{ secrets.TF_VAR_private_subnet_1c_cidr }}
      TF_VAR_public_subnet_1a_cidr: ${{ secrets.TF_VAR_public_subnet_1a_cidr }}
      TF_VAR_public_subnet_1c_cidr: ${{ secrets.TF_VAR_public_subnet_1c_cidr }}
      TF_VAR_vpc_name: ${{ secrets.TF_VAR_vpc_name }}
      TF_VAR_igw_name: ${{ secrets.TF_VAR_igw_name }}
      TF_VAR_backend_port: ${{ secrets.TF_VAR_backend_port }}
      TF_VAR_domain_name: ${{ secrets.TF_VAR_domain_name }}
      TF_VAR_cognito_domain_prefix: ${{ secrets.TF_VAR_cognito_domain_prefix }}
      TF_VAR_frontend_bucket_name: ${{ secrets.TF_VAR_frontend_bucket_name }}
      TF_VAR_s3_endpoint_service_name: ${{ secrets.TF_VAR_s3_endpoint_service_name }}
      TF_VAR_ecr_dkr_endpoint_service_name: ${{ secrets.TF_VAR_ecr_dkr_endpoint_service_name }}
      TF_VAR_ecr_api_endpoint_service_name: ${{ secrets.TF_VAR_ecr_api_endpoint_service_name }}
      TF_VAR_ssm_endpoint_service_name: ${{ secrets.TF_VAR_ssm_endpoint_service_name }}
      TF_VAR_sts_endpoint_service_name: ${{ secrets.TF_VAR_sts_endpoint_service_name }}
      TF_VAR_logs_endpoint_service_name: ${{ secrets.TF_VAR_logs_endpoint_service_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Read Infrastructure Outputs
        id: infra_outputs
        working-directory: ${{ env.TF_DIR_SERVICE }}
        run: |
          terraform init
          echo "ECR_REPOSITORY_URL=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_ENV"
          echo "ASG_NAME=$(terraform output -raw backend_asg_name)" >> "$GITHUB_ENV"
          echo "SECRETS_KMS_KEY_ARN=$(terraform output -raw secrets_kms_key_arn)" >> "$GITHUB_ENV"
          echo "AWS_REGION=$(terraform output -raw aws_region)" >> "$GITHUB_ENV"

      - name: Compute Docker Context Hash
        id: compute_hash
        run: |
          HASH=$(find backend -type f \( -name "Dockerfile" -o -path "*/backend/src/*" -o -path "*/backend/requirements.txt" -o -path "*/backend/uv.lock" \) | sort | xargs sha256sum | sha256sum | cut -d ' ' -f 1)
          echo "image_hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Computed hash: $HASH"

      - name: Set Image Variables
        id: image_vars
        run: |
          IMAGE_TAG="${{ steps.compute_hash.outputs.image_hash }}"
          IMAGE="${{ env.ECR_REPOSITORY_URL }}:${IMAGE_TAG}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "Image: $IMAGE"

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REPOSITORY_URL }}

      - name: Check if Image Exists in ECR
        id: check_image
        run: |
          if aws ecr describe-images --repository-name $(echo ${{ env.ECR_REPOSITORY_URL }} | cut -d'/' -f2) --image-ids imageTag=${{ env.IMAGE_TAG }} --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image already exists in ECR, skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image does not exist, will build"
          fi

      - name: Set up Docker Buildx
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.image_vars.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update SSM Parameter with Backend Environment Variables
        run: |
          aws ssm put-parameter \
            --name "/edutrust/backend/env" \
            --value '${{ secrets.BACKEND_ENV_FILE }}' \
            --type "SecureString" \
            --key-id "${{ env.SECRETS_KMS_KEY_ARN }}" \
            --overwrite \
            --region ${{ env.AWS_REGION }}

      - name: Write terraform.tfvars
        run: |
          echo '${{ secrets.TERRAFORM_VARIABLES }}' > ${{ env.TF_DIR_SERVICE }}/terraform.tfvars

      - name: Update Launch Template with New Image Tag
        working-directory: ${{ env.TF_DIR_SERVICE }}
        run: |
          terraform init
          terraform apply -auto-approve -var="backend_image_tag=${{ env.IMAGE_TAG }}"

      - name: Start ASG Instance Refresh
        id: start_refresh
        run: |
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "${{ env.ASG_NAME }}" \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 60}' \
            --region ${{ env.AWS_REGION }} \
            --query 'InstanceRefreshId' \
            --output text)
          echo "refresh_id=$REFRESH_ID" >> "$GITHUB_OUTPUT"
          echo "Started instance refresh: $REFRESH_ID"

      - name: Monitor ASG Instance Refresh
        run: |
          REFRESH_ID="${{ steps.start_refresh.outputs.refresh_id }}"
          echo "Monitoring instance refresh: $REFRESH_ID"
          
          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${{ env.ASG_NAME }}" \
              --instance-refresh-ids "$REFRESH_ID" \
              --region ${{ env.AWS_REGION }} \
              --query 'InstanceRefreshes[0].Status' \
              --output text)
            
            echo "Current status: $STATUS"
            
            if [ "$STATUS" = "Successful" ]; then
              echo "Instance refresh completed successfully"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Instance refresh failed with status: $STATUS"
              STATUS_REASON=$(aws autoscaling describe-instance-refreshes \
                --auto-scaling-group-name "${{ env.ASG_NAME }}" \
                --instance-refresh-ids "$REFRESH_ID" \
                --region ${{ env.AWS_REGION }} \
                --query 'InstanceRefreshes[0].StatusReason' \
                --output text)
              echo "Failure reason: $STATUS_REASON"
              exit 1
            fi
            
            echo "Waiting 30 seconds before next check..."
            sleep 30
          done

  build-frontend:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-1
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      CLOUDFRONT_DIST_ID: ${{ secrets.CLOUDFRONT_DIST_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Sync to S3
        run: |
          aws s3 sync frontend/out/ s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DIST_ID }} \
            --paths "/*"
