name: Deploy Frontend (S3 + CloudFront)

on:
  push:
    branches:
      - main
    paths:
      - "AWS-FCJ-Project/frontend/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-southeast-1
      S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
      CLOUDFRONT_DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "AWS-FCJ-Project/frontend/package-lock.json"

      - name: Create .env file from secret
        working-directory: AWS-FCJ-Project/frontend
        run: echo "${{ secrets.FRONTEND_ENV_FILE }}" > .env

      - name: Install dependencies
        working-directory: AWS-FCJ-Project/frontend
        run: npm install

      - name: Build and Export
        working-directory: AWS-FCJ-Project/frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync AWS-FCJ-Project/frontend/out s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DIST_ID }} \
            --paths "/*"
