name: Infrastructure Pipeline

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: infra-pipeline
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-1

jobs:
  terraform-core:
    name: Provision Core Infrastructure (Terraform)
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-1
      TF_DIR_BASE: .github/terraform/core
      # Terraform variables from secrets
      TF_VAR_aws_region: ${{ secrets.TF_VAR_aws_region }}
      TF_VAR_ec2_instance_type: ${{ secrets.TF_VAR_ec2_instance_type }}
      TF_VAR_ec2_instance_name: ${{ secrets.TF_VAR_ec2_instance_name }}
      TF_VAR_ec2_key_name: ${{ secrets.TF_VAR_ec2_key_name }}
      TF_VAR_ECR_REPOSITORY_NAME: ${{ secrets.TF_VAR_ECR_REPOSITORY_NAME }}
      TF_VAR_ecr_tag_immutable: ${{ secrets.TF_VAR_ecr_tag_immutable }}
      TF_VAR_asg_min_size: ${{ secrets.TF_VAR_asg_min_size }}
      TF_VAR_asg_max_size: ${{ secrets.TF_VAR_asg_max_size }}
      TF_VAR_asg_desired_capacity: ${{ secrets.TF_VAR_asg_desired_capacity }}
      TF_VAR_backend_image_tag: ${{ secrets.TF_VAR_backend_image_tag }}
      TF_VAR_docdb_egress_cidr_blocks: ${{ secrets.TF_VAR_docdb_egress_cidr_blocks }}
      TF_VAR_redis_egress_cidr_blocks: ${{ secrets.TF_VAR_redis_egress_cidr_blocks }}
      TF_VAR_dns_egress_cidr_blocks: ${{ secrets.TF_VAR_dns_egress_cidr_blocks }}
      TF_VAR_vpc_cidr_block: ${{ secrets.TF_VAR_vpc_cidr_block }}
      TF_VAR_private_subnet_1a_cidr: ${{ secrets.TF_VAR_private_subnet_1a_cidr }}
      TF_VAR_private_subnet_1c_cidr: ${{ secrets.TF_VAR_private_subnet_1c_cidr }}
      TF_VAR_public_subnet_1a_cidr: ${{ secrets.TF_VAR_public_subnet_1a_cidr }}
      TF_VAR_public_subnet_1c_cidr: ${{ secrets.TF_VAR_public_subnet_1c_cidr }}
      TF_VAR_vpc_name: ${{ secrets.TF_VAR_vpc_name }}
      TF_VAR_igw_name: ${{ secrets.TF_VAR_igw_name }}
      TF_VAR_backend_port: ${{ secrets.TF_VAR_backend_port }}
      TF_VAR_domain_name: ${{ secrets.TF_VAR_domain_name }}
      TF_VAR_cognito_domain_prefix: ${{ secrets.TF_VAR_cognito_domain_prefix }}
      TF_VAR_s3_endpoint_service_name: ${{ secrets.TF_VAR_s3_endpoint_service_name }}
      TF_VAR_ecr_dkr_endpoint_service_name: ${{ secrets.TF_VAR_ecr_dkr_endpoint_service_name }}
      TF_VAR_ecr_api_endpoint_service_name: ${{ secrets.TF_VAR_ecr_api_endpoint_service_name }}
      TF_VAR_ssm_endpoint_service_name: ${{ secrets.TF_VAR_ssm_endpoint_service_name }}
      TF_VAR_sts_endpoint_service_name: ${{ secrets.TF_VAR_sts_endpoint_service_name }}
      TF_VAR_logs_endpoint_service_name: ${{ secrets.TF_VAR_logs_endpoint_service_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for Core Infra changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            core:
              - '.github/terraform/core/**'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Write terraform.tfvars
        run: |
          echo '${{ secrets.TERRAFORM_VARIABLES }}' > ${{ env.TF_DIR_BASE }}/terraform.tfvars

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Ensure ECR Repository exists (Create or Import)
        working-directory: ${{ env.TF_DIR_BASE }}
        run: |
          set -euo pipefail
          terraform init
          if [ -f terraform.tfvars ]; then
            REPO_NAME="$(awk -F= '
              $1 ~ /^[[:space:]]*ECR_REPOSITORY_NAME[[:space:]]*$/ {
                v=$2
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", v)
                gsub(/\"/, "", v)
                print v
                exit
              }' terraform.tfvars || true)"
          fi
          REPO_NAME="${REPO_NAME:-edutrust-backend}"
          echo "Found REPO_NAME: $REPO_NAME"

          if aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1; then
            if terraform state show aws_ecr_repository.backend >/dev/null 2>&1; then
              echo "ECR repo $REPO_NAME already in Terraform state, skipping import."
            else
              echo "ECR repo $REPO_NAME exists in AWS but not in state; importing..."
              terraform import aws_ecr_repository.backend "$REPO_NAME" || true
            fi
          else
            echo "ECR repo $REPO_NAME does not exist. Creating with MUTABLE tags..."
            aws ecr create-repository --repository-name "$REPO_NAME" \
              --image-tag-mutability MUTABLE \
              --encryption-configuration encryptionType=AES256 || true
          fi

      - name: Terraform Apply (Core)
        if: steps.filter.outputs.core == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: ${{ env.TF_DIR_BASE }}
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
        run: |
          terraform init
          terraform apply -auto-approve -input=false

  terraform-service:
    name: Provision Service Infrastructure (Terraform)
    runs-on: ubuntu-latest
    needs: terraform-core
    outputs:
      asg_name: ${{ steps.tf_output.outputs.asg_name }}
      aws_region: ${{ steps.tf_output.outputs.aws_region }}
      ecr_repository_url: ${{ steps.tf_output.outputs.ecr_repository_url }}
      backend_port: ${{ steps.tf_output.outputs.backend_port }}
      secrets_kms_key_arn: ${{ steps.tf_output.outputs.secrets_kms_key_arn }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-1
      TF_DIR_APP: .github/terraform/service
      # Terraform variables from secrets
      TF_VAR_aws_region: ${{ secrets.TF_VAR_aws_region }}
      TF_VAR_ec2_instance_type: ${{ secrets.TF_VAR_ec2_instance_type }}
      TF_VAR_ec2_instance_name: ${{ secrets.TF_VAR_ec2_instance_name }}
      TF_VAR_ec2_key_name: ${{ secrets.TF_VAR_ec2_key_name }}
      TF_VAR_ECR_REPOSITORY_NAME: ${{ secrets.TF_VAR_ECR_REPOSITORY_NAME }}
      TF_VAR_ecr_tag_immutable: ${{ secrets.TF_VAR_ecr_tag_immutable }}
      TF_VAR_asg_min_size: ${{ secrets.TF_VAR_asg_min_size }}
      TF_VAR_asg_max_size: ${{ secrets.TF_VAR_asg_max_size }}
      TF_VAR_asg_desired_capacity: ${{ secrets.TF_VAR_asg_desired_capacity }}
      TF_VAR_backend_image_tag: ${{ secrets.TF_VAR_backend_image_tag }}
      TF_VAR_docdb_egress_cidr_blocks: ${{ secrets.TF_VAR_docdb_egress_cidr_blocks }}
      TF_VAR_redis_egress_cidr_blocks: ${{ secrets.TF_VAR_redis_egress_cidr_blocks }}
      TF_VAR_dns_egress_cidr_blocks: ${{ secrets.TF_VAR_dns_egress_cidr_blocks }}
      TF_VAR_vpc_cidr_block: ${{ secrets.TF_VAR_vpc_cidr_block }}
      TF_VAR_private_subnet_1a_cidr: ${{ secrets.TF_VAR_private_subnet_1a_cidr }}
      TF_VAR_private_subnet_1c_cidr: ${{ secrets.TF_VAR_private_subnet_1c_cidr }}
      TF_VAR_public_subnet_1a_cidr: ${{ secrets.TF_VAR_public_subnet_1a_cidr }}
      TF_VAR_public_subnet_1c_cidr: ${{ secrets.TF_VAR_public_subnet_1c_cidr }}
      TF_VAR_vpc_name: ${{ secrets.TF_VAR_vpc_name }}
      TF_VAR_igw_name: ${{ secrets.TF_VAR_igw_name }}
      TF_VAR_backend_port: ${{ secrets.TF_VAR_backend_port }}
      TF_VAR_domain_name: ${{ secrets.TF_VAR_domain_name }}
      TF_VAR_cognito_domain_prefix: ${{ secrets.TF_VAR_cognito_domain_prefix }}
      TF_VAR_s3_endpoint_service_name: ${{ secrets.TF_VAR_s3_endpoint_service_name }}
      TF_VAR_ecr_dkr_endpoint_service_name: ${{ secrets.TF_VAR_ecr_dkr_endpoint_service_name }}
      TF_VAR_ecr_api_endpoint_service_name: ${{ secrets.TF_VAR_ecr_api_endpoint_service_name }}
      TF_VAR_ssm_endpoint_service_name: ${{ secrets.TF_VAR_ssm_endpoint_service_name }}
      TF_VAR_sts_endpoint_service_name: ${{ secrets.TF_VAR_sts_endpoint_service_name }}
      TF_VAR_logs_endpoint_service_name: ${{ secrets.TF_VAR_logs_endpoint_service_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Write terraform.tfvars
        run: |
          echo '${{ secrets.TERRAFORM_VARIABLES }}' > ${{ env.TF_DIR_APP }}/terraform.tfvars

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Terraform Apply (Service)
        working-directory: ${{ env.TF_DIR_APP }}
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
        run: |
          terraform init
          terraform apply -auto-approve -input=false

      - name: Get Terraform Outputs
        id: tf_output
        working-directory: ${{ env.TF_DIR_APP }}
        run: |
          echo "asg_name=$(terraform output -raw backend_asg_name)" >> "$GITHUB_OUTPUT"
          echo "aws_region=$(terraform output -raw aws_region)" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "backend_port=$(terraform output -raw backend_port)" >> "$GITHUB_OUTPUT"
          echo "secrets_kms_key_arn=$(terraform output -raw secrets_kms_key_arn)" >> "$GITHUB_OUTPUT"
